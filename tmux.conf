# Run tmux source-file ./tmux.conf

# --- Prefix ---
unbind C-b
set -g prefix C-a                               # prefix를 C-a로 변경
bind C-a send-prefix

# --- Pane ---
bind -n M-Left select-pane -L                    # 왼쪽 창으로 이동
bind -n M-Right select-pane -R                   # 오른쪽 창으로 이동
bind -n M-Up select-pane -U                      # 위쪽 창으로 이동
bind -n M-Down select-pane -D                    # 아래쪽 창으로 이동
bind | split-window -h -c "#{pane_current_path}" # 수평 분할 (현재 경로 유지)
bind - split-window -v -c "#{pane_current_path}" # 수직 분할 (현재 경로 유지)

# --- Window ---
set -g base-index 1                              # 창 번호 1부터 시작
setw -g pane-base-index 1                        # 패인 번호 1부터 시작
set -g renumber-windows on                       # 창 닫으면 번호 재정렬
bind c new-window -c "#{pane_current_path}"      # 새 창에서 현재 경로 유지

# --- Mouse ---
set -g mouse on                                  # 마우스 사용
bind C-c run "tmux save-buffer - | pbcopy"       # Ctrl-C로 복사

# --- Vi mode ---
setw -g mode-keys vi                             # vi 키바인딩
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Terminal ---
set -g default-terminal "tmux-256color"          # 256색 지원
set -ga terminal-overrides ",xterm*:Tc"          # true color 지원
set -sg escape-time 0                            # ESC 지연 제거
set -g history-limit 50000                       # 스크롤백 버퍼 확대

# --- Status bar ---
set -g status-position top                       # 상태바 상단
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-right "#[fg=white]%Y-%m-%d %H:%M "
